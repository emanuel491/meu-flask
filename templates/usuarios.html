<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pessoas</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<nav>
    <span class="logo">Instaflask</span>
    <div>
        <a href="/feed">Feed</a>
        <a href="/usuarios">Pessoas</a>
        <a href="/perfil/{{ user }}">Perfil</a>
        <a href="/logout">Sair</a>
    </div>
</nav>
<div class="container">
    <h2 style="margin-bottom:16px;">Pessoas</h2>
    {% for u in lista %}
    <div class="user-card">
        <div class="avatar">{{ u.username[0] }}</div>
        <div style="flex:1;">
            <a href="/perfil/{{ u.username }}">{{ u.username }}</a>
            <p>{{ u.bio or 'Sem bio.' }}</p>
        </div>
        <a href="/seguir/{{ u.id }}" class="btn btn-primary" style="font-size:13px; padding:6px 14px;">Seguir</a>
    </div>
    {% else %}
    <p style="color:#999;">Nenhum outro usuário ainda.</p>
    {% endfor %}
</div>
</body>
</html>
