<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Feed</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<nav>
    <span class="logo">Instaflask</span>
    <div>
        <a href="/feed">Feed</a>
        <a href="/usuarios">Pessoas</a>
        <a href="/perfil/{{ user }}">Perfil</a>
        <a href="/logout">Sair</a>
    </div>
</nav>
<div class="container">
    <div class="post-box">
        <form method="POST" action="/post">
            <textarea name="conteudo" rows="3" placeholder="No que você está pensando?"></textarea>
            <button>Publicar</button>
        </form>
    </div>
    {% for p in posts %}
    <div class="card">
        <div class="card-header">
            <div class="avatar">{{ p.username[0] }}</div>
            <a href="/perfil/{{ p.username }}">{{ p.username }}</a>
            <span>{{ p.criado_em[:16] }}</span>
        </div>
        <div class="card-body">{{ p.conteudo }}</div>
        <div class="card-footer">
            <a href="/curtir/{{ p.id }}" class="{{ 'curtido' if p.curtiu else '' }}">
                ❤️ {{ p.curtidas }} curtidas
            </a>
        </div>
    </div>
    {% else %}
    <p style="text-align:center; color:#999; margin-top:40px;">Nenhum post ainda. Seja o primeiro!</p>
    {% endfor %}
</div>
</body>
</html>
